app:
  page_title: SBM Defect Dashboard
  title: Inline Defect Detection Dashboard - SBM
  footer: SBM Inline Vision System | 2 Tunnel x 4 View Dashboard
  refresh_interval_seconds: 5

images:
  base_dir: /home/voptimaise/Projects/SBM/received_images
  extensions:
    - .jpg
    - .jpeg
    - .png
    - .bmp

tunnels:
  Tunnel 1:
    env: SBM_TUNNEL_1_DIR
    base_dir:
    aliases:
      - Tunnel 1
      - Tunnel_1
      - tunnel_1
      - tunnel1
      - T1
      - t1
  Tunnel 2:
    env: SBM_TUNNEL_2_DIR
    base_dir:
    aliases:
      - Tunnel 2
      - Tunnel_2
      - tunnel_2
      - tunnel2
      - T2
      - t2

filters:
  all_tunnels_label: All Tunnels

operator:
  shifts:
    - A
    - B
    - C

validation:
  unvalidated_decision: Not Validated
  decisions:
    - Not Validated
    - Defect Confirmed
    - False Alarm

mqtt:
  brokers:
    - voptimaipi5.local
  port: 8883
  topic: hotmetal/env/reading
  tls_enabled: true
  ca_file: /etc/mosquitto/certs/ca.crt
  connect_timeout_seconds: 1
